name: Run GitHub Actions tests

on:
  push:
    branches: [ main, development, experimental ]
  pull_request:
    branches: [ main, development, experimental ]

jobs:
  build:

    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.12", "3.13" ]
        runs-on: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python  ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version:  ${{ matrix.python-version }}


    - name: Test WormChemotaxis
      run: |
        echo "Running WormChemotaxis tests..."
        
        cd WormChemotaxis
        pip install -r requirements.txt

        git clone -b Worm-Locomotion https://github.com/Barrios-Lab/Chemotaxis-Data-and-Analysis.git
        
        python ideas.py


    - name: Test FissionYeastPhenotyping
      run: |
        echo "Running FissionYeastPhenotyping tests..."
        
        cd FissionYeastPhenotyping
        pip install -r requirements.txt
        python ideas.py


    - name: Test BiasedConnectivityVentralSubiculum
      run: |
        echo "Running BiasedConnectivityVentralSubiculum tests..."
        
        cd BiasedConnectivityVentralSubiculum
        pip install -r requirements.txt
        python ideas.py

        pip install nbmake  
        pytest --nbmake Example_3D_plots.ipynb



    - name: Final information on installed packages
      run: |
        echo "Installed packages:"
        pip list
